<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      /* The Modal (background) */
      .modal {
          display: none; /* Hidden by default */
          position: fixed; /* Stay in place */
          z-index: 1; /* Sit on top */
          left: 0;
          top: 0;
          width: 100%; /* Full width */
          height: 100%; /* Full height */
          background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
      }

      /* Modal Content/Box */
      .modal-content {
          background-color: #fefefe;
          margin: 15% auto; /* 15% from the top and centered */
          padding: 20px;
          border: 1px solid #888;
          width: 80%; /* Could be more or less, depending on screen size */
      }

      /* The Close Button */
      .close {
          color: #aaa;
          float: right;
          font-size: 28px;
          font-weight: bold;
      }

      .close:hover,
      .close:focus {
          color: black;
          text-decoration: none;
          cursor: pointer;
      }

      /* Modal Content */
      .bottom-modal-content {
          position: fixed;
          bottom: 0;
          background-color: #fefefe;
          width: 100%;
          animation-name: slideIn;
          animation-duration: 0.4s
      }

      @keyframes slideIn {
          from {bottom: -300px; opacity: 0}
          to {bottom: 0; opacity: 1}
      }

      .modal-header {
          padding: 2px 16px;
          background-color: #5cb85c;
          color: white;
      }

    </style>
    <script src="https://cdn.bootcss.com/jquery/3.2.1/jquery.min.js"></script>
    <link href="https://cdn.bootcss.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.bootcss.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  </head>
  <body style="padding:100px 200px;">
    <!-- Trigger/Open The Modal -->
    <button id="myBtn">Open Modal</button>
    <button id="myBottomBtn">Open Bottom Modal</button>
    <hr>
    <div class="bootstrap-modal">
      <!-- Large modal -->
      <button type="button" class="btn btn-primary" data-toggle="modal" data-target=".bs-example-modal-lg">Large modal</button>

      <div class="modal fade bs-example-modal-lg" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel">
        <div class="modal-dialog modal-lg" role="document">
          <div class="modal-content">
            ...
          </div>
        </div>
      </div>

      <!-- Small modal -->
      <button type="button" class="btn btn-primary" data-toggle="modal" data-target=".bs-example-modal-sm">Small modal</button>

      <div class="modal fade bs-example-modal-sm" tabindex="-1" role="dialog" aria-labelledby="mySmallModalLabel">
        <div class="modal-dialog modal-sm" role="document">
          <div class="modal-content">
            ...
          </div>
        </div>
      </div>
    </div>
    <!-- The Modal -->
    <div id="myModal" class="modal">

      <!-- Modal content -->
      <div class="modal-content">
        <span class="close">&times;</span>
        <p>Some text in the Modal..</p>
      </div>
    </div>

    <!-- The Modal -->
    <div id="bottomModal" class="modal">
      <!-- Modal content -->
      <div class="bottom-modal-content">
        <div class="modal-header">
          <span class="close">&times;</span>
           <h2>Model Header</h2>
        </div>
        <div class="modal-body">
          <p>Some text in the Body..</p>
          <p>Some text in the Modal..</p>
          <p>Some text in the Body..</p>
          <p>Some text in the Modal..</p>
        </div>
        <div class="modal-header">
           <h2>Model footer</h2>
        </div>
      </div>
    </div>
  </body>
  <script type="text/javascript">
    // Get the modal
    var modal = document.getElementById('myModal');
    var bottomModal = document.getElementById('bottomModal');

    // Get the button that opens the modal
    var btn = document.getElementById("myBtn");
    var bottomBtn = document.getElementById('myBottomBtn');

    // Get the <span> element that closes the modal
    var span = document.getElementsByClassName("close")[0];
    var bottomClose = document.getElementsByClassName("close")[1];

    // When the user clicks on the button, open the modal
    btn.onclick = function() {
      modal.style.display = "block";
    }

    bottomBtn.onclick = function() {
      bottomModal.style.display = 'block';
    }
    // When the user clicks on <span> (x), close the modal
    span.onclick = function() {
      modal.style.display = "none";
      bottomModal.style.display = "none";
    }

    bottomClose.onclick = function(){
      bottomModal.style.display = "none";
    }

    // When the user clicks anywhere outside of the modal, close it
    window.onclick = function(event) {
      if (event.target == modal || event.target == bottomModal) {
          modal.style.display = "none";
          bottomModal.style.display = "none";
      }
    }
  </script>
</html>
